<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}寻根溯源{% endblock %}</title>
    <style>
        :root {
            --bg: #f7f8f4;
            --panel: #ffffff;
            --line: #d6ddd2;
            --ink: #20251f;
            --muted: #667061;
            --accent: #2f6f4e;
            --accent-soft: #e5f1ea;
            --danger: #a64032;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #eef3ed 0%, var(--bg) 100%);
        }
        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }
        .nav {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .brand {
            font-size: 24px;
            font-weight: 800;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(45, 70, 50, 0.06);
        }
        .grid {
            display: grid;
            gap: 16px;
        }
        .grid-2 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        input, select, textarea, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--line);
            font: inherit;
        }
        button {
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }
        button.danger { background: var(--danger); }
        button.secondary { background: #6e7f65; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border-bottom: 1px solid #e5eadf;
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }
        .flash {
            padding: 10px 14px;
            border-radius: 8px;
            background: #f2f7e8;
            border: 1px solid #d7e3c2;
            margin-bottom: 16px;
        }
        .muted { color: var(--muted); }
        .inline-form {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .actions a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }
        .dashboard-hero {
            position: relative;
            overflow: hidden;
            padding: 30px;
            border: 0;
            color: #f8fff6;
            background:
                radial-gradient(circle at 84% 18%, rgba(255,255,255,0.22) 0 10%, transparent 11%),
                linear-gradient(135deg, #1f4936 0%, #376d4d 56%, #8e7a42 100%);
        }
        .dashboard-hero::after {
            content: "";
            position: absolute;
            inset: auto -40px -90px auto;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 42px solid rgba(255,255,255,0.08);
        }
        .dashboard-hero h1 {
            position: relative;
            margin: 0 0 8px;
            font-size: clamp(30px, 5vw, 48px);
            letter-spacing: 0.04em;
        }
        .dashboard-hero p {
            position: relative;
            max-width: 560px;
            margin: 0;
            color: rgba(248,255,246,0.82);
        }
        .hero-actions {
            position: relative;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            font-weight: 800;
            text-decoration: none;
        }
        .actions a.button-link {
            color: #fff;
        }
        .button-link.light {
            background: #fff;
            color: #214934;
        }
        .stat-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255,255,255,0.78);
            box-shadow: 0 8px 24px rgba(45, 70, 50, 0.05);
        }
        .stat-card strong {
            display: block;
            font-size: 28px;
            line-height: 1.1;
        }
        .dashboard-section-title {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 12px;
            margin: 24px 0 12px;
        }
        .dashboard-section-title h2 {
            margin: 0;
        }
        .genealogy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 14px;
        }
        .genealogy-card {
            display: grid;
            gap: 14px;
            min-height: 170px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.94), rgba(250,253,248,0.94)),
                radial-gradient(circle at 100% 0%, rgba(47,111,78,0.18), transparent 34%);
            box-shadow: 0 12px 28px rgba(45, 70, 50, 0.07);
        }
        .genealogy-card h3 {
            margin: 0;
            font-size: 20px;
        }
        .genealogy-card a {
            color: inherit;
            text-decoration: none;
        }
        .genealogy-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .genealogy-pill {
            display: inline-flex;
            padding: 5px 9px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #31543d;
            font-size: 13px;
            font-weight: 700;
        }
        .card-actions {
            align-self: end;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-actions a {
            color: var(--accent);
            font-weight: 800;
            text-decoration: none;
        }
        .empty-state {
            padding: 28px;
            border: 1px dashed #c8d5c2;
            border-radius: 14px;
            background: rgba(255,255,255,0.62);
            text-align: center;
        }
        .detail-hero {
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 20px;
            align-items: end;
            padding: 28px;
            border: 0;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.94), rgba(244,248,239,0.94)),
                radial-gradient(circle at 92% 12%, rgba(142,122,66,0.24), transparent 28%),
                radial-gradient(circle at 0% 100%, rgba(47,111,78,0.18), transparent 32%);
        }
        .detail-hero h1 {
            margin: 0 0 8px;
            font-size: clamp(30px, 5vw, 46px);
            letter-spacing: 0.03em;
        }
        .detail-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .detail-badge {
            display: inline-flex;
            padding: 6px 10px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid var(--line);
            color: #38533a;
            font-weight: 800;
            font-size: 13px;
        }
        .detail-quick {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .quick-card {
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            text-decoration: none;
            color: var(--ink);
            box-shadow: 0 10px 26px rgba(45, 70, 50, 0.06);
        }
        .quick-card strong {
            display: block;
            margin-bottom: 4px;
            color: var(--accent);
        }
        .content-split {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 16px;
            align-items: start;
        }
        .table-panel {
            overflow: hidden;
        }
        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .table-header h2 {
            margin: 0;
        }
        .table-wrap {
            overflow-x: auto;
        }
        .member-list-summary {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .member-list-toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #edf2e9;
            border-radius: 14px;
            background: linear-gradient(180deg, #fbfdf8, #f5f9f0);
        }
        .member-directory {
            display: grid;
            gap: 10px;
        }
        .member-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            padding: 14px;
            border: 1px solid #e3eadf;
            border-radius: 16px;
            background:
                linear-gradient(90deg, rgba(229,241,234,0.7), transparent 34%),
                #fff;
            box-shadow: 0 8px 20px rgba(45, 70, 50, 0.04);
        }
        .member-row:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(45, 70, 50, 0.08);
        }
        .member-avatar {
            display: grid;
            place-items: center;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: #2f6f4e;
            color: #fff;
            font-size: 20px;
            font-weight: 900;
        }
        .member-avatar.female {
            background: #8e6f42;
        }
        .member-main {
            min-width: 0;
        }
        .member-name-line {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 6px;
        }
        .member-name-line strong {
            font-size: 18px;
        }
        .member-code {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }
        .member-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .member-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: #f1f6ec;
            color: #43533e;
            font-size: 13px;
            font-weight: 700;
        }
        .member-row-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .ghost-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 7px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 800;
            text-decoration: none;
        }
        .pagination-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding-top: 14px;
            margin-top: 14px;
            border-top: 1px solid #edf2e9;
        }
        .pagination-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 800;
            text-decoration: none;
        }
        .actions a.pagination-link {
            color: var(--accent);
        }
        .pagination-current {
            padding: 8px 12px;
            border-radius: 999px;
            background: #f4f8ef;
        }
        .member-table th {
            background: #f4f8ef;
            color: #43533e;
            font-size: 13px;
        }
        .member-table tbody tr:hover {
            background: #fbfdf8;
        }
        .inline-delete {
            display: inline;
        }
        .small-danger {
            width: auto;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
        }
        .side-panel {
            position: sticky;
            top: 16px;
        }
        .member-card {
            background: #fbfdf8;
            border: 1px solid #dbe4d6;
            border-radius: 8px;
            padding: 10px;
            min-width: 170px;
            max-width: 220px;
        }
        .member-title {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 6px;
        }
        .member-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 999px;
            background: #edf4ea;
            color: #466043;
            font-size: 12px;
        }
        .path-steps {
            display: grid;
            gap: 10px;
        }
        .path-step {
            padding: 12px;
            border: 1px solid #dbe4d6;
            border-radius: 8px;
            background: #fbfdf8;
        }
        .tree-canvas {
            overflow-x: auto;
            padding: 12px 0 4px;
        }
        .org-tree,
        .org-tree ul {
            list-style: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .org-tree ul {
            display: flex;
            justify-content: center;
            position: relative;
            padding-top: 26px;
        }
        .org-tree li {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 0 14px;
        }
        .org-tree li::before,
        .org-tree li::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50%;
            height: 18px;
            border-top: 2px solid #cad7c6;
        }
        .org-tree li::before {
            right: 50%;
            border-right: 2px solid #cad7c6;
        }
        .org-tree li::after {
            left: 50%;
            border-left: 2px solid #cad7c6;
        }
        .org-tree li:only-child::before,
        .org-tree li:only-child::after {
            display: none;
        }
        .org-tree li:first-child::before,
        .org-tree li:last-child::after {
            border-top: 0;
        }
        .org-tree li:first-child::after {
            border-radius: 8px 0 0 0;
        }
        .org-tree li:last-child::before {
            border-radius: 0 8px 0 0;
        }
        .org-tree ul::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            height: 26px;
            border-left: 2px solid #cad7c6;
        }
        .tree-node {
            display: inline-flex;
            gap: 10px;
            align-items: stretch;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 8px;
            background: #ffffff;
            border: 1px solid #d6ddd2;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(40, 70, 45, 0.08);
        }
        .spouse-link {
            align-self: center;
            width: 18px;
            border-top: 2px solid #b8c7b3;
        }
        .member-picker {
            position: relative;
        }
        .member-picker-menu {
            display: none;
            position: absolute;
            z-index: 20;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            max-height: 260px;
            overflow-y: auto;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 28px rgba(35, 55, 35, 0.14);
        }
        .member-picker.open .member-picker-menu {
            display: block;
        }
        .member-picker-option {
            width: 100%;
            border: 0;
            border-radius: 0;
            background: #fff;
            color: var(--ink);
            text-align: left;
            cursor: pointer;
        }
        .member-picker-option:hover,
        .member-picker-option:focus {
            background: var(--accent-soft);
        }
        .member-picker-option .muted {
            display: block;
            font-size: 12px;
            margin-top: 2px;
        }
        .member-picker-empty {
            padding: 10px 12px;
        }
        @media (max-width: 700px) {
            .inline-form { grid-template-columns: 1fr; }
            .tree-node { flex-direction: column; }
            .spouse-link { width: 100%; }
            .dashboard-hero { padding: 24px; }
            .detail-hero { grid-template-columns: 1fr; }
            .content-split { grid-template-columns: 1fr; }
            .side-panel { position: static; }
            .member-row { grid-template-columns: auto minmax(0, 1fr); }
            .member-row-actions {
                grid-column: 1 / -1;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <div class="brand"><a href="{{ url_for('main.dashboard') }}">寻根溯源</a></div>
            <div class="nav-links">
                {% if session.get('user_id') %}
                    <a href="{{ url_for('main.dashboard') }}">控制台</a>
                    <a href="{{ url_for('main.logout') }}">退出</a>
                {% else %}
                    <a href="{{ url_for('main.login') }}">登录</a>
                    <a href="{{ url_for('main.register') }}">注册</a>
                {% endif %}
            </div>
        </div>

        {% with messages = get_flashed_messages() %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
    <script>
        document.querySelectorAll("[data-member-picker]").forEach((picker) => {
            const input = picker.querySelector(".member-picker-input");
            const hidden = picker.querySelector(".member-picker-value");
            const menu = picker.querySelector(".member-picker-menu");
            const searchUrl = picker.dataset.searchUrl;
            let aborter = null;
            let selectedLabel = input.value;

            function closeMenu() {
                picker.classList.remove("open");
            }

            function render(items) {
                menu.innerHTML = "";
                if (!items.length) {
                    const empty = document.createElement("div");
                    empty.className = "member-picker-empty muted";
                    empty.textContent = "没有匹配成员";
                    menu.appendChild(empty);
                    picker.classList.add("open");
                    return;
                }
                items.forEach((item) => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.className = "member-picker-option";
                    const title = document.createElement("strong");
                    title.textContent = item.name;
                    const meta = document.createElement("span");
                    meta.className = "muted";
                    meta.textContent = `${item.gender} · 第 ${item.generation_no} 代 · ${item.birth_year || "生年未知"}`;
                    button.append(title, meta);
                    button.addEventListener("click", () => {
                        input.value = item.name;
                        hidden.value = item.id;
                        selectedLabel = item.name;
                        closeMenu();
                    });
                    menu.appendChild(button);
                });
                picker.classList.add("open");
            }

            async function search() {
                if (aborter) aborter.abort();
                aborter = new AbortController();
                const url = new URL(searchUrl, window.location.origin);
                url.searchParams.set("q", input.value.trim());
                try {
                    const response = await fetch(url, { signal: aborter.signal });
                    if (!response.ok) throw new Error("search failed");
                    render(await response.json());
                } catch (error) {
                    if (error.name !== "AbortError") {
                        render([]);
                    }
                }
            }

            input.addEventListener("input", () => {
                if (input.value !== selectedLabel) {
                    hidden.value = "";
                }
                search();
            });
            input.addEventListener("focus", search);
            document.addEventListener("click", (event) => {
                if (!picker.contains(event.target)) closeMenu();
            });
            picker.closest("form")?.addEventListener("submit", (event) => {
                if (picker.dataset.required === "1" && !hidden.value) {
                    event.preventDefault();
                    input.focus();
                    picker.classList.add("open");
                }
            });
        });
    </script>
</body>
</html>
